spring:
  application:
    name: ride-matching-engine

  # ── PostgreSQL + PostGIS ──────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ridedb}
    username: ${DATABASE_USERNAME:ride_user}
    password: ${DATABASE_PASSWORD:ride_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── Redis ─────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  # ── Kafka ─────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ride-matching-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ridematching.engine.*"
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}

# ── Server ────────────────────────────────────
server:
  port: ${PORT:8080}

# ── Management ────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── Logging ───────────────────────────────────
logging:
  level:
    root: WARN
    com.ridematching: INFO
    org.flywaydb: INFO

# ── JWT ───────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:7b2e4f8a1d6c9e3b5f0a2d7c4e8b1f3a6d9c2e5b8f1a4d7c0e3b6f9a2d5c8e1b}
    expiration: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}